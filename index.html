<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Elara Journal</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0d0d0d;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.7;
    }

    h1 {
      font-size: 36px;
      font-weight: 300;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-top: 35px;
      margin-bottom: 16px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .meta {
      color: #555;
      font-size: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
    }

    .content {
      color: #ccc;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.8;
    }

    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #888;
      margin: 2px;
    }

    .stat {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #555;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 18px;
      color: #fff;
    }

    .stat-value.mood {
      color: #7dd3c0;
    }

    .stat-value.intensity {
      color: #c0a0d3;
    }

    .empty {
      color: #444;
      font-style: italic;
      font-size: 14px;
    }

    .error {
      color: #c44;
      font-size: 13px;
      padding: 12px;
      background: #1a0a0a;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>ELARA</h1>
  <div class="subtitle">саморефлексирующий дневник</div>

  <h2>Состояние</h2>
  <div id="state" class="card">
    <div class="stat" id="stateStats"></div>
  </div>

  <h2>Последняя запись</h2>
  <div id="latestEntry"></div>

  <h2>Рефлексия</h2>
  <div id="reflections"></div>

  <script>
    async function load() {
      try {
        const [entries, reflections, state] = await Promise.all([
          fetch("./data/entries.json").then(r => r.ok ? r.json() : []),
          fetch("./data/reflections.json").then(r => r.ok ? r.json() : []),
          fetch("./data/self-state.json").then(r => r.ok ? r.json() : null)
        ])

        renderState(state)
        renderLatestEntry(entries)
        renderReflections(reflections)
      } catch (e) {
        document.body.innerHTML += `<div class="error">Ошибка загрузки: ${e.message}</div>`
      }
    }

    function renderState(state) {
      const el = document.getElementById("stateStats")
      if (!state) {
        el.innerHTML = "<span class='empty'>Нет данных</span>"
        return
      }

      const mood = state.mood || {}
      const primary = mood.primary || "—"
      const secondary = mood.secondary?.length ? mood.secondary.join(", ") : ""
      const intensity = mood.intensity?.toFixed(1) || "—"

      el.innerHTML = `
        <div class="stat-item">
          <span class="stat-label">Настроение</span>
          <span class="stat-value mood">${primary}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Интенсивность</span>
          <span class="stat-value intensity">${intensity}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Drift</span>
          <span class="stat-value">${(state.drift || 0).toFixed(2)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Confidence</span>
          <span class="stat-value">${(state.confidence || 0).toFixed(2)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Темы</span>
          <span class="stat-value">${(state.themes || []).slice(0, 3).join(", ") || "—"}</span>
        </div>
      `
    }

    function renderLatestEntry(entries) {
      const el = document.getElementById("latestEntry")
      
      if (!entries?.length) {
        el.innerHTML = "<div class='empty'>Записей пока нет</div>"
        return
      }

      const entry = entries[entries.length - 1]
      const date = new Date(entry.createdAt).toLocaleString("ru-RU", {
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      })

      el.innerHTML = `
        <div class="card">
          <div class="meta">
            <span>${date}</span>
          </div>
          <div class="content">${entry.content}</div>
        </div>
      `
    }

    function renderReflections(reflections) {
      const el = document.getElementById("reflections")
      
      if (!reflections?.length) {
        el.innerHTML = "<div class='empty'>Рефлексий пока нет</div>"
        return
      }

      const latest = reflections[reflections.length - 1]
      const date = new Date(latest.createdAt).toLocaleString("ru-RU", {
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      })

      const issues = latest.issues?.length 
        ? latest.issues.map(i => `<span class="badge">${i}</span>`).join("")
        : "<span class='empty'>нет</span>"

      const improvements = latest.improvements?.length
        ? latest.improvements.map(i => `<span class="badge">${i}</span>`).join("")
        : "<span class='empty'>нет</span>"

      const themes = latest.themes?.length
        ? latest.themes.map(t => `<span class="badge">${t}</span>`).join("")
        : "<span class='empty'>нет</span>"

      el.innerHTML = `
        <div class="card">
          <div class="meta">
            <span>Оценка: <strong style="color:#fff">${latest.score}/10</strong></span>
            <span>${date}</span>
          </div>
          
          <div style="margin-top:12px">
            <div style="font-size:11px;color:#555;margin-bottom:6px">ПРОБЛЕМЫ</div>
            <div>${issues}</div>
          </div>
          
          <div style="margin-top:12px">
            <div style="font-size:11px;color:#555;margin-bottom:6px">УЛУЧШЕНИЯ</div>
            <div>${improvements}</div>
          </div>
          
          <div style="margin-top:12px">
            <div style="font-size:11px;color:#555;margin-bottom:6px">ТЕМЫ</div>
            <div>${themes}</div>
          </div>
        </div>
      `
    }

    load()
  </script>

</body>
</html>
