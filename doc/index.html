<!-- docs/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Elara Journal</title>
</head>
<body>
  <h1>Elara Journal</h1>

  <h2>State</h2>
  <pre id="state"></pre>

  <h2>Latest Entries</h2>
  <div id="entries"></div>

  <h2>Latest Reflections</h2>
  <div id="reflections"></div>

  <script>
    async function load() {
      const [entries, reflections, state] = await Promise.all([
        fetch("../data/entries.json").then(r => r.json()),
        fetch("../data/reflections.json").then(r => r.json()),
        fetch("../data/self-state.json").then(r => r.json())
      ])

      // state
      document.getElementById("state").textContent =
        JSON.stringify(state, null, 2)

      // entries
      const entriesEl = document.getElementById("entries")
      entries.slice(-5).reverse().forEach(e => {
        const div = document.createElement("div")
        div.innerHTML = `<p>${e.content}</p><hr/>`
        entriesEl.appendChild(div)
      })

      // reflections
      const reflEl = document.getElementById("reflections")
      reflections.slice(-5).reverse().forEach(r => {
        const div = document.createElement("div")
        div.innerHTML = `
          <p><b>Score:</b> ${r.score}</p>
          <p><b>Issues:</b> ${r.issues.join(", ")}</p>
          <p><b>Improvements:</b> ${r.improvements.join(", ")}</p>
          <hr/>
        `
        reflEl.appendChild(div)
      })
    }

    load()
  </script>
</body>
</html>
